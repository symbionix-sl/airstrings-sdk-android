name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Use CI JDK
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Build
        run: ./gradlew :airstrings:assembleRelease

      - name: Unit tests
        run: ./gradlew :airstrings:testReleaseUnitTest
